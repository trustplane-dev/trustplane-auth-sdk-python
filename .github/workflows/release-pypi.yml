name: Publish Tagged PyPI SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Verified signed TrustPlane release tag to publish, for example v0.2.2
        required: true
        type: string
      publish_package:
        description: Publish the already tagged package to PyPI
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  PACKAGE_NAME: trustplane-auth-sdk
  RELEASE_SIGNING_FINGERPRINT: 6F46FDF8F73DDBAAAF5DEBA1FAB81A8805C362CA

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Require main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "release workflow must run from main"
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Upgrade pip
        run: python -m pip install -U pip
      - name: Install package and dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Validate version input
        run: |
          if ! printf '%s\n' "${{ inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "version must look like v0.2.2 or v0.2.2-rc.1"
            exit 1
          fi
          python - <<'PY'
          import os
          import re

          version = os.environ["INPUT_VERSION"]
          match = re.fullmatch(r"v([0-9]+)\.([0-9]+)\.([0-9]+)(?:-rc\.([0-9]+))?", version)
          if match is None:
              raise SystemExit("invalid version")
          major, minor, patch, rc = match.groups()
          package_version = f"{major}.{minor}.{patch}"
          if rc is not None:
              package_version = f"{package_version}rc{rc}"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env:
              env.write(f"PYTHON_PACKAGE_VERSION={package_version}\n")
          print(f"TrustPlane version: {version}")
          print(f"Python package version: {package_version}")
          PY
        env:
          INPUT_VERSION: ${{ inputs.version }}
      - name: Verify signed release tag targets main
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if ! git rev-parse -q --verify "refs/tags/$RELEASE_VERSION" >/dev/null; then
            echo "missing release tag: $RELEASE_VERSION"
            exit 1
          fi
          if [ "$(git rev-parse "$RELEASE_VERSION^{commit}")" != "$(git rev-parse HEAD)" ]; then
            echo "release tag must target the dispatched main commit"
            exit 1
          fi
          export GNUPGHOME="$(mktemp -d)"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          gpg --batch --import .github/release-signing-key.asc
          if ! verification="$(git verify-tag --raw "$RELEASE_VERSION" 2>&1)"; then
            printf '%s\n' "$verification"
            exit 1
          fi
          printf '%s\n' "$verification"
          printf '%s\n' "$verification" | grep -F "[GNUPG:] VALIDSIG $RELEASE_SIGNING_FINGERPRINT " >/dev/null
      - name: Verify package version matches the release tag
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as file:
              package_version = tomllib.load(file)["project"]["version"]
          expected_version = os.environ["PYTHON_PACKAGE_VERSION"]
          if package_version != expected_version:
              raise SystemExit(
                  f"pyproject.toml version {package_version} does not match release version {expected_version}"
              )
          PY
      - name: Refuse existing PyPI version
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          package_name = os.environ["PACKAGE_NAME"]
          package_version = os.environ["PYTHON_PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{package_name}/json"
          try:
              with urllib.request.urlopen(url, timeout=20) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print(f"PyPI project does not exist yet: {package_name}")
                  sys.exit(0)
              raise

          if package_version in data.get("releases", {}):
              raise SystemExit(f"PyPI version already exists: {package_name}=={package_version}")
          print(f"PyPI version is unused: {package_name}=={package_version}")
          PY
      - name: Format check
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest
      - name: Leak scan
        run: scripts/scan-leaks.sh
      - name: Wording scan
        run: scripts/scan-wording.sh
      - name: Build sdist and wheel
        run: python -m build
      - name: Clean wheel install/import smoke
        run: scripts/smoke-wheel.sh
      - name: Dry-run summary
        if: ${{ inputs.publish_package == false }}
        run: |
          {
            echo "### PyPI release readiness complete"
            echo
            echo "Verified the signed tag and smoke-tested $PACKAGE_NAME==$PYTHON_PACKAGE_VERSION."
            echo
            echo "publish_package=false, so this run did not publish to PyPI."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Require PyPI Trusted Publishing
        if: ${{ inputs.publish_package }}
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "PyPI Trusted Publishing/OIDC is not available to this job."
            echo "Configure PyPI Trusted Publishing for $PACKAGE_NAME and keep id-token: write enabled."
            exit 1
          fi
      - name: Publish package with PyPI Trusted Publishing
        if: ${{ inputs.publish_package }}
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Publish summary
        if: ${{ inputs.publish_package }}
        run: |
          {
            echo "### PyPI release published"
            echo
            echo "Published $PACKAGE_NAME==$PYTHON_PACKAGE_VERSION with PyPI Trusted Publishing."
          } >> "$GITHUB_STEP_SUMMARY"
